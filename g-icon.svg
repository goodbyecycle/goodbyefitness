<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Pink outer border -->
  <rect x="4" y="4" width="248" height="248" rx="38" ry="38" fill="#FF8CB8"/>
  <!-- Gray middle layer -->
  <rect x="20" y="20" width="216" height="216" rx="28" ry="28" fill="#A8A8A8"/>
  <!-- Blue inner -->
  <rect x="36" y="36" width="184" height="184" rx="18" ry="18" fill="#1652C0"/>
  <!-- G letter - gray shadow (offset right and down) -->
  <g transform="translate(134,138)">
    <text font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="180" text-anchor="middle" dominant-baseline="central" fill="#9A9A9A">G</text>
  </g>
  <!-- G letter - blue front -->
  <g transform="translate(126,130)">
    <text font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="180" text-anchor="middle" dominant-baseline="central" fill="#1652C0">G</text>
  </g>
